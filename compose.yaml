services:
  traefik:
    image: traefik:v3.4
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-traefik
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/traefik:/etc/traefik/dynamic:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-nginx
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html

  composer:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-composer
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      COMPOSER_HOME: /var/www/html/.composer
    entrypoint: ["composer"]
    profiles: ["tools"]

  node:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-node
    working_dir: /var/www/html/web/themes/custom/psmhydraulics
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    command: sh -lc "npm install && npm run dev"

  db:
    image: mariadb:11.4
    container_name: ${COMPOSE_PROJECT_NAME:-psm-hydraulics}-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-drupal}
      MARIADB_USER: ${DB_USER:-drupal}
      MARIADB_PASSWORD: ${DB_PASSWORD:-drupal}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-drupal_root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db-data:
